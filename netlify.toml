[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes return index.html so React Router works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy /api calls to Railway backend
# Replace the :splat URL with your actual Railway URL after deploying the backend
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR-APP.up.railway.app/api/:splat"
  status = 200
  force  = true
